<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Rustic Bildge</title>
        <style>
         #dropZone {
             width: 100%;
             max-width: 400px;
             margin: 20px auto;
             padding: 20px;
             border: 2px dashed #ccc;
             border-radius: 10px;
             text-align: center;
             color: #999;
         }
         #dropZone.dragover {
             border-color: #000;
             color: #000;
         }

         .upload-row {
             margin: 8px 0;
             padding: 8px;
             border: 1px solid #ccc;
             border-radius: 8px;
             border-left: 10px solid #999;
             background: #f7f7f7;
             transition: background 0.2s ease, border-color 0.2s ease;
         }

         .upload-row.uploading {
             border-left-color: #f5c400;
             background: #fff8d6;
         }

         .upload-row.success {
             border-left-color: #2aa84a;
             background: #e8ffe8;
         }

         .upload-row.error {
             border-left-color: #d92c2c;
             background: #ffe8e8;
         }
        </style>
    </head>
    <body style="font-family:system-ui;">
        <div style="display:flex;justify-content:space-between;">
            <div style="display:flex;align-items: center;"><img src="/icon.svg" height="64" width="64" /><h1>Rustic Bildge</h1></div>
            <div style="display: flex;flex-direction: column;text-align: right;">
                <div>Connection: <div id="conStats">RUN</div></div>
                <div style="display:flex;align-items:center;"><a href="/kill">Kill</a> Server</div>
            </div>
        </div>
        <!-- Key Feature 1: Drag-and-Drop Support -->
        <div id="dropZone">Drag and drop a file here or click to select</div>
        <!-- Hidden file input for fallback and click-to-select -->
        <input type="file" id="fileInput" style="display: none;" multiple>
        <!-- Response area to show upload result -->
        <div id="response" style="margin-top: 20px;"></div>
        <script>

         /* NOTE THIS STUFF IS VIBECODED TO HELL
          * I DONT'T GET IT AT ALL */
         const dropZone = document.getElementById('dropZone');
         const fileInput = document.getElementById('fileInput');
         const responseDiv = document.getElementById('response');
         // Highlight the drop zone when dragging a file
         dropZone.addEventListener('dragover', (event) => {
             event.preventDefault(); // Prevent default to allow drop
             dropZone.classList.add('dragover'); // visual highligher
         });
         // Remove highlight when dragging leaves the drop zone
         dropZone.addEventListener('dragleave', () => {
             dropZone.classList.remove('dragover');
         });
         // Handle file drop (Key Feature 1 : File drag and drop)
         dropZone.addEventListener('drop', async (event) => {
             event.preventDefault(); // Prevent default behavior
             dropZone.classList.remove('dragover'); // Remove highlight
             const files = event.dataTransfer.files; // Get the dropped files
             if (files.length > 0) {
                 uploadFilesWithPerFileProgress(files);
             }
         });
         // Handle click to open file input dialog
         dropZone.addEventListener('click', () => {
             fileInput.click(); // Trigger file input dialog
         });
         // Handle file selection via input dialog
         fileInput.addEventListener('change', async (event) => {
             const files = event.target.files; // Get the selected files
             if (files.length > 0) {
                 uploadFilesWithPerFileProgress(files);
             }
         });
         // Unit simplifier
         const formatFileSize = b =>
             b === 0 ? '0 B' :
             `${parseFloat((b / 1024 ** (i = Math.floor(Math.log(b) / Math.log(1024)))).toFixed(2))} ${['B','KB','MB','GB','TB', 'X'][i < 5 ? i : 5]}`;
         // Create the UI for the upload progress per stuff
         function createUploadRow(file) {
             const row = document.createElement("div");
             row.className = "upload-row";
             row.classList.add("uploading");
             row.style.cssText = "margin:8px 0; padding:8px; border:1px solid #ccc; border-radius:8px;";

             const title = document.createElement("div");
             title.textContent = `${file.name} (${formatFileSize(file.size)})`;

             const progress = document.createElement("progress");
             progress.max = 100;
             progress.value = 0;
             progress.style.cssText = "width:100%; height:16px;";

             const status = document.createElement("div");
             status.textContent = "Queued…";
             status.style.cssText = "margin-top:6px; font-family:monospace; white-space:pre-wrap;";

             row.appendChild(title);
             row.appendChild(progress);
             row.appendChild(status);

             return { row, progress, status };
         }

         function uploadOneFileXHR(file, {
             url = "/receiver",
             fieldName = "files", // Format from the server
             onProgress = () => {},
             onDone = () => {},
             onError = () => {},
         } = {}) {
             const formData = new FormData();
             formData.append(fieldName, file, file.name);

             const xhr = new XMLHttpRequest();
             xhr.open("POST", url, true);

             xhr.upload.onprogress = (e) => {
                 if (!e.lengthComputable) return;
                 onProgress(e.loaded, e.total);
             };

             xhr.onload = () => {
                 // Try to parse JSON like your fetch version
                 let parsed = null;
                 try { parsed = JSON.parse(xhr.responseText); } catch {}

                 if (xhr.status >= 200 && xhr.status < 300) {
                     onDone(parsed, xhr);
                 } else {
                     const msg = parsed?.error || xhr.responseText || `HTTP ${xhr.status}`;
                     onError(new Error(msg), xhr);
                 }
             };

             xhr.onerror = () => onError(new Error("Network error"), xhr);
             xhr.onabort = () => onError(new Error("Upload aborted"), xhr);

             xhr.send(formData);
             return xhr; // so you can abort if you add a cancel button later
         }

         async function uploadFilesWithPerFileProgress(files, {
             concurrency = 3,
             url = "/receiver",
         } = {}) {
             const uploadsDiv = document.getElementById("uploads");
             const list = Array.from(files);

             // Create UI rows upfront so user sees them immediately
             const items = list.map((file) => {
                 const ui = createUploadRow(file);
                 responseDiv.prepend(ui.row);
                 return { file, ui };
             });

             // Simple worker pool for concurrency
             let nextIndex = 0;
             const workers = Array.from({ length: Math.min(concurrency, items.length) }, () => worker());
             await Promise.all(workers);

             async function worker() {
                 while (true) {
                     const i = nextIndex++;
                     if (i >= items.length) return;
                     await uploadOne(items[i]);
                 }
             }

             function uploadOne({ file, ui }) {
                 ui.status.textContent = "Uploading…";
                 ui.progress.value = 0;
                 return new Promise((resolve) => {
                     uploadOneFileXHR(file, {
                         url,
                         fieldName: "files",
                         onProgress(loaded, total) {
                             ui.progress.value = (loaded / total) * 100;
                             ui.status.textContent = `Uploading… ${(ui.progress.value).toFixed(1)}% (${formatFileSize(loaded)} / ${formatFileSize(total)})`;
                         },
                         onDone(result) {
                             ui.row.classList.remove("uploading");
                             ui.row.classList.add("success");
                             ui.progress.value = 100;
                             ui.status.textContent =
                                 `✅ Success\n${result ? JSON.stringify(result, null, 2) : "(no JSON body)"}`;
                             resolve();
                         },
                         onError(err) {
                             ui.row.classList.remove("uploading");
                             ui.row.classList.add("error");
                             ui.status.textContent = `❌ Error\n${err.message}`;
                             resolve();
                         },
                     });
                 });
             }
         }
         let running = false;
         function setStatus(text, fg, bg) {
             document.getElementById("conStats").textContent = text;
             document.getElementById("conStats").style.color = fg;
             document.getElementById("conStats").style.backgroundColor = bg;
             document.getElementById("conStats").style.display = "inline-block";
             document.getElementById("conStats").style.padding = "4px 8px";
             document.getElementById("conStats").style.fontWeight = "bold";
             document.getElementById("conStats").style.borderRadius = "4px";
         }
         /* function setStatus(text, color) {
          *     document.getElementById("conStats").textContent = text;
          *     document.getElementById("conStats").style.color = color;
          * } */
         async function heartbeat() {
             if (running) return;
             running = true;
             setStatus("RUN", "black", "goldenrod");
             const controller = new AbortController();
             const timeout = setTimeout(() => {
                 controller.abort();
             }, 3000); // timeout ms

             try {
                 const res = await fetch("/checkalive", { cache: "no-store", signal: controller.signal });
                 //console.log("alive");
                 if (res.ok){
                     setStatus("OK", "white", "green");
                 }
                 else {setStatus("LOSS", "white", "red");}
             } catch {
                 setStatus("LOSS", "white", "red");
             } finally {
                 clearTimeout(timeout);
                 running = false;
                 setTimeout(heartbeat, 5000);
             }
         }
         // Initial trigger of the heartbeat
         heartbeat();

         //setInterval(heartbeat, 5000);
        </script>
    </body>
</html>
